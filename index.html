<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorldGen — Procedural Terrain Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'JetBrains Mono', monospace; }
    canvas { display: block; }

    /* ── Loading ── */
    #loading-overlay {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0a0e17 0%, #1a1e2e 100%);
      color: #e0e6f0; transition: opacity 0.6s ease;
      font-family: 'JetBrains Mono', monospace;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    #loading-overlay h1 { font-size: 1.6rem; font-weight: 300; letter-spacing: 0.3em; margin-bottom: 2rem; text-transform: uppercase; }
    #loading-bar-container { width: 320px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
    #loading-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #58a6ff, #a371f7); border-radius: 2px; transition: width 0.15s ease; }
    #loading-status { margin-top: 1rem; font-size: 0.75rem; color: rgba(255,255,255,0.4); }

    /* ── HUD ── */
    #hud-biome {
      position: fixed; top: 16px; left: 296px; z-index: 100;
      font-size: 0.85rem; font-weight: 600; color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7); letter-spacing: 0.05em;
    }
    #hud-stats {
      position: fixed; top: 16px; right: 20px; z-index: 100;
      font-size: 0.7rem; color: rgba(255,255,255,0.6);
      text-align: right; line-height: 1.7;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5); font-variant-numeric: tabular-nums;
    }
    #hud-clock {
      font-size: 0.85rem; font-weight: 600; color: rgba(255,255,255,0.8);
      margin-bottom: 2px;
    }

    /* ── Crosshair ── */
    #crosshair { display: none; position: fixed; top: 50%; left: 50%; z-index: 50; pointer-events: none; }
    #crosshair .ch { position: absolute; background: rgba(255,255,255,0.7); }
    #crosshair .ch-h { width: 12px; height: 2px; top: -1px; left: -6px; }
    #crosshair .ch-v { width: 2px; height: 12px; top: -6px; left: -1px; }
    body.pointer-locked #crosshair { display: block; }

    /* ── Click-to-play / Pause overlays ── */
    #click-to-play, #pause-overlay {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.75);
      font-size: 1.1rem; font-weight: 400; letter-spacing: 0.12em;
      cursor: pointer; transition: opacity 0.3s ease;
    }
    #pause-overlay { display: none; }
    body.pointer-locked #click-to-play { display: none; }

    /* ── Dev Tool Panel (left side) ── */
    #control-panel {
      position: fixed; top: 0; left: 0; bottom: 0;
      z-index: 300; width: 280px;
      background: #0d1117;
      border-right: 1px solid #30363d;
      overflow-y: auto; overflow-x: hidden;
      transition: transform 0.25s ease;
      scrollbar-width: thin;
      scrollbar-color: #30363d transparent;
    }
    #control-panel::-webkit-scrollbar { width: 5px; }
    #control-panel::-webkit-scrollbar-track { background: transparent; }
    #control-panel::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    #control-panel.hidden { transform: translateX(-100%); }

    .panel-section { padding: 14px 16px 10px; border-bottom: 1px solid #21262d; }
    .panel-section:last-child { border-bottom: none; }
    .section-header {
      font-size: 0.65rem; font-weight: 700; color: #8b949e;
      text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px;
    }

    /* Seed row */
    .seed-row { display: flex; gap: 6px; margin-bottom: 8px; }
    #seed-input {
      flex: 1; padding: 6px 8px;
      background: #161b22; border: 1px solid #30363d; border-radius: 4px;
      color: #c9d1d9; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
      outline: none;
    }
    #seed-input:focus { border-color: #58a6ff; }
    .seed-btn {
      padding: 6px 10px;
      background: #21262d; border: 1px solid #30363d; border-radius: 4px;
      color: #8b949e; font-size: 0.75rem; cursor: pointer;
      position: relative; transition: color 0.15s, background 0.15s;
    }
    .seed-btn:hover { background: #30363d; color: #c9d1d9; }
    .seed-btn .tooltip {
      display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
      padding: 3px 8px; background: #58a6ff; color: #0d1117; border-radius: 4px;
      font-size: 0.6rem; white-space: nowrap; margin-bottom: 4px;
    }
    .seed-btn .tooltip.show { display: block; }

    /* Share URL */
    .share-row { display: flex; gap: 6px; margin-top: 6px; }
    #share-url {
      flex: 1; padding: 5px 8px;
      background: #161b22; border: 1px solid #30363d; border-radius: 4px;
      color: #58a6ff; font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      outline: none; cursor: default;
    }

    /* Sliders */
    .slider-group { margin-bottom: 10px; }
    .slider-group label {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.65rem; color: #8b949e; margin-bottom: 3px;
    }
    .slider-group label span { color: #c9d1d9; font-variant-numeric: tabular-nums; }
    .slider-group input[type="range"] {
      width: 100%; height: 3px; -webkit-appearance: none; appearance: none;
      background: #21262d; border-radius: 2px; outline: none;
    }
    .slider-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      background: #58a6ff; border-radius: 50%; cursor: pointer;
      border: 2px solid #0d1117;
    }

    /* Buttons */
    .panel-btn {
      width: 100%; padding: 7px 10px; margin-bottom: 6px;
      background: #21262d; border: 1px solid #30363d; border-radius: 6px;
      color: #c9d1d9; font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
      cursor: pointer; text-align: center; letter-spacing: 0.04em;
      transition: background 0.15s, border-color 0.15s;
    }
    .panel-btn:hover { background: #30363d; border-color: #484f58; }
    .panel-btn.primary {
      background: linear-gradient(135deg, rgba(88,166,255,0.15), rgba(163,113,247,0.15));
      border-color: rgba(88,166,255,0.3);
    }
    .panel-btn.primary:hover {
      background: linear-gradient(135deg, rgba(88,166,255,0.25), rgba(163,113,247,0.25));
    }
    .btn-row { display: flex; gap: 6px; margin-bottom: 6px; }
    .btn-row .panel-btn { flex: 1; margin-bottom: 0; }

    #export-status {
      font-size: 0.6rem; color: #a371f7; text-align: center;
      min-height: 16px; margin-bottom: 4px;
    }

    /* Hidden file input */
    #import-file { display: none; }

    /* ── Tab hint ── */
    #tab-hint {
      position: fixed; bottom: 12px; left: 12px; z-index: 90;
      font-size: 0.6rem; color: rgba(255,255,255,0.2);
      letter-spacing: 0.06em; pointer-events: none;
    }

    /* ── Minimap ── */
    #minimap-wrap {
      position: fixed; bottom: 16px; right: 16px; z-index: 100;
      width: 180px; text-align: center;
    }
    #minimap-biome {
      font-size: 0.6rem; color: rgba(255,255,255,0.5);
      letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px;
    }
    #minimap-ring {
      width: 180px; height: 180px; border-radius: 50%; overflow: hidden;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgba(10,10,30,0.35);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      position: relative;
    }
    #minimap { display: block; width: 180px; height: 180px; }
    #minimap-north {
      position: absolute; top: 4px; left: 50%; transform: translateX(-50%);
      font-size: 0.55rem; font-weight: 700; color: rgba(255,255,255,0.45);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <h1>WorldGen</h1>
    <div id="loading-bar-container"><div id="loading-bar"></div></div>
    <div id="loading-status">Initializing…</div>
  </div>

  <div id="click-to-play">Click to Play</div>
  <div id="pause-overlay">PAUSED &mdash; Click to Resume &ensp;|&ensp; Tab for Settings</div>

  <div id="hud-biome">Plains</div>
  <div id="hud-stats">
    <div id="hud-clock">12:00 ☀</div>
    <div id="stat-fps">60 FPS</div>
    <div id="stat-chunks">0 chunks</div>
    <div id="stat-verts">0 vertices</div>
    <div id="stat-trees">0 trees · 0 bushes</div>
  </div>

  <div id="crosshair"><div class="ch ch-h"></div><div class="ch ch-v"></div></div>

  <div id="tab-hint">TAB : Panel</div>

  <div id="minimap-wrap">
    <div id="minimap-biome">Plains</div>
    <div id="minimap-ring">
      <canvas id="minimap" width="180" height="180"></canvas>
      <div id="minimap-north">N</div>
    </div>
  </div>

  <!-- ── Dev Tool Panel ── -->
  <div id="control-panel">

    <!-- SEED -->
    <div class="panel-section">
      <div class="section-header">&#x1F30D; World Seed</div>
      <div class="seed-row">
        <input type="text" id="seed-input" spellcheck="false" autocomplete="off" placeholder="seed..." />
        <button class="seed-btn" id="btn-copy-seed" title="Copy seed">&#x1F4CB;<span class="tooltip" id="copy-tooltip">Copied!</span></button>
      </div>
      <button class="panel-btn primary" id="btn-regenerate">&#x21BB; Regenerate World</button>
      <div class="share-row">
        <input type="text" id="share-url" readonly />
        <button class="seed-btn" id="btn-share" title="Copy share link">&#x1F517;<span class="tooltip" id="share-tooltip">Copied!</span></button>
      </div>
    </div>

    <!-- TERRAIN -->
    <div class="panel-section">
      <div class="section-header">&#x26F0; Terrain</div>
      <div class="slider-group">
        <label>Noise Scale <span id="val-noise-scale">0.003</span></label>
        <input type="range" id="slider-noise-scale" min="0.001" max="0.01" step="0.0005" value="0.003" />
      </div>
      <div class="slider-group">
        <label>Octaves <span id="val-octaves">6</span></label>
        <input type="range" id="slider-octaves" min="1" max="8" step="1" value="6" />
      </div>
      <div class="slider-group">
        <label>Persistence <span id="val-persistence">0.5</span></label>
        <input type="range" id="slider-persistence" min="0.1" max="0.9" step="0.05" value="0.5" />
      </div>
      <div class="slider-group">
        <label>Lacunarity <span id="val-lacunarity">2.0</span></label>
        <input type="range" id="slider-lacunarity" min="1.5" max="3.5" step="0.1" value="2.0" />
      </div>
    </div>

    <!-- BIOME -->
    <div class="panel-section">
      <div class="section-header">&#x1F33F; Biome</div>
      <div class="slider-group">
        <label>Moisture Scale <span id="val-moisture">0.002</span></label>
        <input type="range" id="slider-moisture" min="0.0005" max="0.008" step="0.0005" value="0.002" />
      </div>
      <div class="slider-group">
        <label>Temp Strength <span id="val-temperature">1.0</span></label>
        <input type="range" id="slider-temperature" min="0.0" max="2.0" step="0.1" value="1.0" />
      </div>
    </div>

    <!-- ENVIRONMENT -->
    <div class="panel-section">
      <div class="section-header">&#x1F324; Environment</div>
      <div class="slider-group">
        <label>Time of Day <span id="val-time">12:00</span></label>
        <input type="range" id="slider-time" min="0" max="24" step="0.25" value="12" />
      </div>
      <div class="slider-group">
        <label>Fog Density <span id="val-fog">0.003</span></label>
        <input type="range" id="slider-fog" min="0" max="0.02" step="0.001" value="0.003" />
      </div>
    </div>

    <!-- EXPORT -->
    <div class="panel-section">
      <div class="section-header">&#x1F4E4; Export</div>
      <div id="export-status"></div>
      <div class="btn-row">
        <button class="panel-btn" id="btn-export-height">Heightmap</button>
        <button class="panel-btn" id="btn-export-biome">Biome Map</button>
      </div>
      <div class="btn-row">
        <button class="panel-btn" id="btn-export-config">Config</button>
        <button class="panel-btn" id="btn-import-config">Import</button>
      </div>
      <button class="panel-btn" id="btn-screenshot">&#x1F4F7; Screenshot <span style="color:#8b949e; font-size:0.55rem;">(F2)</span></button>
      <input type="file" id="import-file" accept=".json" />
    </div>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
